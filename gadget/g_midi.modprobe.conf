# Install to: /etc/modprobe.d/g_midi.conf
# USB-MIDI gadget identity + buffering. qlen is the MIDI packet queue depth (higher = fewer
# dropped events under bursts; 32 is plenty for one trigger). index=0 keeps it as card 0-ish;
# the script auto-detects the actual /dev/snd/midiC*D* node regardless.
options g_midi index=0 id=BBBDrum iManufacturer=drums55 iProduct="BBB FSR Trigger" in_ports=1 out_ports=1 qlen=32
